description: >-
  Self-hosted web-page change detector that watches URLs on a schedule and fires webhooks on diff —
  deterministic XPath/CSS selectors rather than AI inference.
why_it_matters: >-
  When a marketer needs reliable, cheap, deterministic monitoring of competitor pricing pages, job
  boards, or changelogs — and will pipe the diffs through an LLM themselves — this is the pick
  where Open Scouts' prompt-loop would be overkill.
