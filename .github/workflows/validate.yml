# Validates YAML entries, rebuilds README/site data, and checks links on every PR and push to main.
name: validate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: validate-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate entries
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Check links
        run: npm run check:links
